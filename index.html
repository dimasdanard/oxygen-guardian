<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Oxygen Guardian</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="menu">

<h1>🌍 Oxygen Guardian</h1>

<p class="instructions">
Collect oxygen bubbles to clean the air and avoid pollution clouds.
Protect Earth's air quality as long as possible.
Use arrow keys to move.
</p>

<div class="buttons">
<button id="startBtn">Start Game</button>
<button id="pauseBtn">Pause</button>
<button id="restartBtn">Restart</button>
</div>

</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<div class="hud">
<span id="score">Score: 0</span>
<span id="health">Air Quality: 100%</span>
<span id="level">Level: 1</span>
</div>

<script src="game.js"></script>

</body>
</html>
