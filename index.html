<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Oxygen Guardian</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="menu">

<h1>🌍 Oxygen Guardian</h1>

<p class="instructions">
Collect oxygen from trees and clean pollution from factories.
Protect the city's air quality as long as possible.
</p>

<div class="buttons">
<button id="startBtn">Start Game</button>
<button id="pauseBtn">Pause</button>
<button id="restartBtn">Restart</button>
</div>

</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<div class="hud">

<div id="score">Score: 0</div>
<div id="oxygen">Oxygen: 0</div>

<div class="aqiContainer">
<div id="aqiBar"></div>
</div>

<div id="aqiText">AQI: 50</div>

</div>

<script src="game.js"></script>

</body>
</html>
