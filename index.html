<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Oxygen Guardian</title>

<link rel="stylesheet" href="css/game.css">

</head>

<body>

<div class="menu">

<h1>Oxygen Guardian</h1>

<p>
Collect clean oxygen and avoid pollution.  
Trees generate oxygen while factories produce pollution.  
Protect Earth's air quality.
</p>

<button id="startBtn">Start Game</button>
<button id="pauseBtn">Pause</button>
<button id="restartBtn">Restart</button>

</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<div class="hud">

<div id="score">Score: 0</div>
<div id="health">Air Quality: 100%</div>
<div id="level">Level: 1</div>

</div>

<script src="js/game.js"></script>

</body>
</html>
